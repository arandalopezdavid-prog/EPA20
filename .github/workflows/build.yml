name: Compilar EPA20 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Instalar Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip build-essential git zip unzip \
            openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev

      - name: Instalar Buildozer y Cython
        run: |
          pip install buildozer cython==0.29.33

      - name: Compilar APK
        working-directory: EPA20
        run: |
          buildozer -v android debug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v3
        with:
          name: EPA20-APK
          path: EPA20/bin/*.apk
